name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rebrand-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Check rebrand leakage
        run: bash scripts/ci/check-rebrand-leakage.sh

  zombie-import-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check zombie imports
        run: node scripts/check-no-zombie-imports.mjs

  stub-debt-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check stub debt
        run: node scripts/check-stub-debt.mjs

  throwing-stub-callers-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Self-test classifier (fixture-based)
        run: node scripts/check-throwing-stub-callers.mjs --self-test

      - name: Check throwing-stub-with-live-callers
        run: node scripts/check-throwing-stub-callers.mjs

  attestation-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Self-test classifier (fixture-based)
        run: node scripts/check-attestations.mjs --self-test

      - name: Check module attestations
        run: node scripts/check-attestations.mjs

  obsolescence-audit-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check obsolescence audit
        run: node scripts/check-obsolescence-audit.mjs

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check
        run: pnpm check

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build
        run: pnpm build

      - name: Validate release artifact (early signal — runs again in publish-next)
        run: pnpm release:check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build canvas bundle
        run: pnpm canvas:a2ui:bundle

      - name: Test
        run: pnpm test
        env:
          REMOTECLAW_TEST_WORKERS: 1
          REMOTECLAW_TEST_MAX_OLD_SPACE_SIZE_MB: 1536

  test-gateway-preauth:
    # Scoped gateway lane for the pre-auth hardening defense-in-depth
    # suite (#2644). The full gateway suite is gated behind
    # REMOTECLAW_TEST_INCLUDE_GATEWAY=1 because of orthogonal pre-existing
    # failures unrelated to this slice; running only the hardening file
    # gives the new 1009 close-code + diagnostic event + connection budget
    # behavior continuous CI coverage without enabling the full suite.
    # Tracked separately from `test` so a hardening regression surfaces
    # cleanly.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build canvas bundle
        run: pnpm canvas:a2ui:bundle

      - name: Run pre-auth hardening tests
        run: pnpm exec vitest run --config vitest.gateway.config.ts --pool=forks src/gateway/server.preauth-hardening.test.ts
        env:
          REMOTECLAW_TEST_INCLUDE_GATEWAY: "1"

  test-ui-smoke:
    # Browser-mode smoke lane for the RemoteClawApp host class. Scoped to
    # the two sync-regression defense-in-depth suites — class-instance
    # presence (#2495 / #2496) and computed-style layout (#2519). Kept
    # separate from `pnpm test` because (a) browser-mode needs a real
    # browser binary and (b) the rest of `ui/**/*.test.ts` has out-of-scope
    # failures tracked separately from the sync-regression class.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Resolve Playwright version
        id: pw-version
        run: |
          echo "version=$(pnpm --dir ui exec playwright --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        # Cache the downloaded browser bundle so the flaky cdn.playwright.dev
        # download (#2684) is skipped on the common path (cache hit). Keyed on
        # the resolved Playwright version so a version bump invalidates cleanly.
        # First run on a new version is a miss (the install step below seeds it);
        # every subsequent run restores from cache and skips the CDN entirely.
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        # Cache-miss populator + on-hit no-op (browser already present from the
        # cache step above); always runs `--with-deps` to ensure OS deps. Bound +
        # retry the install so a transient Playwright-CDN or apt stall fails fast
        # and self-heals instead of holding the runner for the 6h job default
        # (#2684). Each attempt is capped by `timeout`; step-level
        # timeout-minutes is the hard backstop.
        timeout-minutes: 15
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install (attempt ${attempt}/3)"
            if timeout --kill-after=30s 4m pnpm --dir ui exec playwright install --with-deps chromium; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::playwright install attempt ${attempt}/3 did not succeed"
            if [ "${attempt}" -lt 3 ]; then
              sleep "$((attempt * 15))"
            fi
          done
          echo "::error::playwright Chromium install failed after 3 attempts"
          exit 1

      - name: UI smoke tests (browser-mode)
        run: pnpm test:ui:smoke

  CI:
    if: always()
    needs:
      [
        rebrand-gate,
        zombie-import-gate,
        stub-debt-gate,
        throwing-stub-callers-gate,
        obsolescence-audit-gate,
        lint,
        build,
        test,
        test-gateway-preauth,
        test-ui-smoke,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.rebrand-gate.result }}" != "success" || "${{ needs.zombie-import-gate.result }}" != "success" || "${{ needs.stub-debt-gate.result }}" != "success" || "${{ needs.throwing-stub-callers-gate.result }}" != "success" || "${{ needs.obsolescence-audit-gate.result }}" != "success" || "${{ needs.lint.result }}" != "success" || "${{ needs.build.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.test-gateway-preauth.result }}" != "success" || "${{ needs.test-ui-smoke.result }}" != "success" ]]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi

  publish-next:
    if: github.event_name == 'push'
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Configure npm registry
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: pnpm build

      - name: Stamp next version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TS=$(date -u +%Y%m%d%H%M%S)
          NEXT_VERSION="${PKG_VERSION}-next.${BUILD_TS}.${SHORT_SHA}"
          npm version "$NEXT_VERSION" --no-git-tag-version

      - name: Sync extension versions
        run: pnpm plugins:sync-version

      - name: Validate release artifacts
        run: pnpm release:check

      - name: Publish next
        run: npm publish --tag next --provenance --access public

  publish-latest:
    if: github.event_name == 'release'
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Configure npm registry
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Stamp version from tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Release tag: $TAG (version: $VERSION)"
          echo "package.json version: $PKG_VERSION"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::notice::Stamping version from tag: $PKG_VERSION → $VERSION"
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        run: pnpm build

      - name: Sync extension versions
        run: pnpm plugins:sync-version

      - name: Validate release artifacts
        run: pnpm release:check

      - name: Publish
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            npm publish --provenance --tag beta --access public
          else
            npm publish --provenance --access public
          fi
