name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rebrand-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Check rebrand leakage
        run: bash scripts/ci/check-rebrand-leakage.sh

  zombie-import-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check zombie imports
        run: node scripts/check-no-zombie-imports.mjs

  stub-debt-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check stub debt
        run: node scripts/check-stub-debt.mjs

  throwing-stub-callers-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Self-test classifier (fixture-based)
        run: node scripts/check-throwing-stub-callers.mjs --self-test

      - name: Check throwing-stub-with-live-callers
        run: node scripts/check-throwing-stub-callers.mjs

  attestation-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Self-test classifier (fixture-based)
        run: node scripts/check-attestations.mjs --self-test

      - name: Check module attestations
        run: node scripts/check-attestations.mjs

  obsolescence-audit-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check obsolescence audit
        run: node scripts/check-obsolescence-audit.mjs

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check
        run: pnpm check

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build
        run: pnpm build

      - name: Validate release artifact (early signal — runs again in publish-next)
        run: pnpm release:check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build canvas bundle
        run: pnpm canvas:a2ui:bundle

      - name: Test
        run: pnpm test
        env:
          REMOTECLAW_TEST_WORKERS: 1
          REMOTECLAW_TEST_MAX_OLD_SPACE_SIZE_MB: 1536

  test-ui-smoke:
    # Browser-mode smoke lane for the RemoteClawApp host class. Scoped to
    # the two sync-regression defense-in-depth suites — class-instance
    # presence (#2495 / #2496) and computed-style layout (#2519). Kept
    # separate from `pnpm test` because (a) browser-mode needs a real
    # browser binary and (b) the rest of `ui/**/*.test.ts` has out-of-scope
    # failures tracked separately from the sync-regression class.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Install Playwright Chromium
        run: pnpm --dir ui exec playwright install --with-deps chromium

      - name: UI smoke tests (browser-mode)
        run: pnpm test:ui:smoke

  CI:
    if: always()
    needs:
      [
        rebrand-gate,
        zombie-import-gate,
        stub-debt-gate,
        throwing-stub-callers-gate,
        obsolescence-audit-gate,
        lint,
        build,
        test,
        test-ui-smoke,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.rebrand-gate.result }}" != "success" || "${{ needs.zombie-import-gate.result }}" != "success" || "${{ needs.stub-debt-gate.result }}" != "success" || "${{ needs.throwing-stub-callers-gate.result }}" != "success" || "${{ needs.obsolescence-audit-gate.result }}" != "success" || "${{ needs.lint.result }}" != "success" || "${{ needs.build.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.test-ui-smoke.result }}" != "success" ]]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi

  publish-next:
    if: github.event_name == 'push'
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Configure npm registry
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: pnpm build

      - name: Stamp next version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TS=$(date -u +%Y%m%d%H%M%S)
          NEXT_VERSION="${PKG_VERSION}-next.${BUILD_TS}.${SHORT_SHA}"
          npm version "$NEXT_VERSION" --no-git-tag-version

      - name: Sync extension versions
        run: pnpm plugins:sync-version

      - name: Validate release artifacts
        run: pnpm release:check

      - name: Publish next
        run: npm publish --tag next --provenance --access public

  publish-latest:
    if: github.event_name == 'release'
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Configure npm registry
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Stamp version from tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Release tag: $TAG (version: $VERSION)"
          echo "package.json version: $PKG_VERSION"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::notice::Stamping version from tag: $PKG_VERSION → $VERSION"
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        run: pnpm build

      - name: Sync extension versions
        run: pnpm plugins:sync-version

      - name: Validate release artifacts
        run: pnpm release:check

      - name: Publish
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            npm publish --provenance --tag beta --access public
          else
            npm publish --provenance --access public
          fi
