services:
  remoteclaw-gateway:
    image: ${REMOTECLAW_IMAGE:-remoteclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      REMOTECLAW_GATEWAY_TOKEN: ${REMOTECLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${REMOTECLAW_CONFIG_DIR}:/home/node/.remoteclaw
      - ${REMOTECLAW_WORKSPACE_DIR}:/home/node/.remoteclaw/workspace
    ports:
      - "${REMOTECLAW_GATEWAY_PORT:-18789}:18789"
      - "${REMOTECLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${REMOTECLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  remoteclaw-cli:
    image: ${REMOTECLAW_IMAGE:-remoteclaw:local}
    network_mode: "service:remoteclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      REMOTECLAW_GATEWAY_TOKEN: ${REMOTECLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${REMOTECLAW_CONFIG_DIR}:/home/node/.remoteclaw
      - ${REMOTECLAW_WORKSPACE_DIR}:/home/node/.remoteclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - remoteclaw-gateway
