name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.event.pull_request.number) || format('ci-push-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Check
        run: pnpm check

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build
        run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Build canvas bundle
        run: pnpm canvas:a2ui:bundle

      - name: Test
        run: pnpm test
        env:
          REMOTECLAW_TEST_WORKERS: 1
          REMOTECLAW_TEST_MAX_OLD_SPACE_SIZE_MB: 1536

  publish-next:
    if: github.event_name == 'push'
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Configure npm registry
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >=11.5.1 for OIDC token exchange
      - name: Upgrade npm
        run: npm install -g "npm@>=11.5.1"

      - name: Build
        run: pnpm build

      - name: Publish next
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TS=$(date -u +%Y%m%d%H%M%S)
          NEXT_VERSION="${PKG_VERSION}-next.${BUILD_TS}.${SHORT_SHA}"

          if npm view "remoteclaw@${NEXT_VERSION}" version &>/dev/null; then
            echo "Version ${NEXT_VERSION} already published, skipping"
            exit 0
          fi

          npm version "$NEXT_VERSION" --no-git-tag-version
          npm publish --tag next --provenance --access public || true

  publish-latest:
    if: github.event_name == 'release'
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"

      - name: Configure npm registry
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g "npm@>=11.5.1"

      - name: Validate version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          REMOTECLAW_TEST_WORKERS: 2
          REMOTECLAW_TEST_MAX_OLD_SPACE_SIZE_MB: 4096

      - name: Publish
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            npm publish --provenance --tag beta --access public
          else
            npm publish --provenance --access public
          fi
