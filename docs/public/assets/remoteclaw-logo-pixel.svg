<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 16 16" role="img" aria-label="RemoteClaw crab">
  <rect width="16" height="16" fill="none"/>
  <!-- claws -->
  <g fill="#FF5A36">
    <rect x="0" y="3" width="1" height="1"/>
    <rect x="1" y="2" width="1" height="1"/>
    <rect x="2" y="2" width="1" height="1"/>
    <rect x="2" y="3" width="1" height="1"/>
    <rect x="0" y="4" width="1" height="1"/>
    <rect x="1" y="4" width="1" height="1"/>
    <rect x="13" y="3" width="1" height="1"/>
    <rect x="14" y="2" width="1" height="1"/>
    <rect x="15" y="3" width="1" height="1"/>
    <rect x="13" y="2" width="1" height="1"/>
    <rect x="14" y="4" width="1" height="1"/>
    <rect x="15" y="4" width="1" height="1"/>
  </g>
  <!-- arms -->
  <g fill="#E04E30">
    <rect x="2" y="4" width="1" height="1"/>
    <rect x="3" y="5" width="1" height="1"/>
    <rect x="13" y="4" width="1" height="1"/>
    <rect x="12" y="5" width="1" height="1"/>
  </g>
  <!-- body outline -->
  <g fill="#8B2500">
    <rect x="4" y="4" width="8" height="1"/>
    <rect x="3" y="5" width="1" height="1"/>
    <rect x="12" y="5" width="1" height="1"/>
    <rect x="3" y="9" width="1" height="1"/>
    <rect x="12" y="9" width="1" height="1"/>
    <rect x="4" y="10" width="8" height="1"/>
  </g>
  <!-- body -->
  <g fill="#FF5A36">
    <rect x="4" y="5" width="8" height="1"/>
    <rect x="3" y="6" width="10" height="1"/>
    <rect x="3" y="7" width="10" height="1"/>
    <rect x="3" y="8" width="10" height="1"/>
    <rect x="4" y="9" width="8" height="1"/>
  </g>
  <!-- belly highlight -->
  <g fill="#FF8A6B">
    <rect x="5" y="7" width="6" height="1"/>
    <rect x="6" y="8" width="4" height="1"/>
  </g>
  <!-- eyes (dark, 1px dots matching brand avatar) -->
  <g fill="#081016">
    <rect x="6" y="6" width="1" height="1"/>
    <rect x="9" y="6" width="1" height="1"/>
  </g>
  <!-- legs -->
  <g fill="#E04E30">
    <rect x="3" y="10" width="1" height="1"/>
    <rect x="2" y="11" width="1" height="1"/>
    <rect x="5" y="10" width="1" height="1"/>
    <rect x="5" y="11" width="1" height="1"/>
    <rect x="7" y="10" width="1" height="1"/>
    <rect x="7" y="11" width="1" height="1"/>
    <rect x="8" y="10" width="1" height="1"/>
    <rect x="8" y="11" width="1" height="1"/>
    <rect x="10" y="10" width="1" height="1"/>
    <rect x="10" y="11" width="1" height="1"/>
    <rect x="12" y="10" width="1" height="1"/>
    <rect x="13" y="11" width="1" height="1"/>
  </g>
</svg>
