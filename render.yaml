services:
  - type: web
    name: remoteclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: REMOTECLAW_GATEWAY_PORT
        value: "8080"
      - key: REMOTECLAW_STATE_DIR
        value: /data/.remoteclaw
      - key: REMOTECLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: REMOTECLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: remoteclaw-data
      mountPath: /data
      sizeGB: 1
